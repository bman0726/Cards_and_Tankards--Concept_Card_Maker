<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!DOCTYPE html>
<html>
<head>
    <title>Cards & Tankards Concept Card Maker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Cards & Tankards Concept Card Maker</h1>

<div class="container">

<div class="controls">

<h2>Card Image</h2>
<input type="file" id="cardImage" accept="image/*">


<h2>Faction</h2>
<select id="faction">
    <option value="Neutral">Neutral</option>
    <option value="AO">Augur Order</option>
    <option value="PG">Plundering Guild</option>
    <option value="DM">Dungeon Master</option>
    <option value="WH">Wild Horde</option>
</select>


<h2>Rarity</h2>
<select id="rarity">
    <option value="Common">Common</option>
    <option value="Uncommon">Uncommon</option>
    <option value="Rare">Rare</option>
    <option value="Legendary">Legendary</option>
</select>


<h2>Card Type</h2>
<select id="cardType">
    <option value="Creature">Creature</option>
    <option value="Spell">Spell</option>
    <option value="Relic">Relic</option>
</select>



<h2>Card Info</h2>

<hr>

<input id="name" 
placeholder="Card Name"
maxlength="65"
>

<input id="mana"
placeholder="Mana Cost"
maxlength="2"
>

<select id="subtype"></select>

<div id="customSubtypeContainer" style="display:none;">
    <label>Custom Subtype</label>
    <input id="customSubtype" type="text" placeholder="Custom Subtype">
</div>    

<div id="creatureStats">

<input
id="attack"
placeholder="Attack"
maxlength="2"
>

<input 
id="health"
placeholder="Health"
maxlength="2"
>

</div>


<div id="relicStats">

<input 
id="sparks" 
placeholder="Sparks"
maxlength="2"
>

</div>

<hr>
<h3>Attributes</h3>
<div id="attributeCheckboxes"></div>
<hr>

<h3>Statuses</h3>
<div id="statusCheckboxes"></div>
<hr>

<textarea
    id="ability" 
    maxlength="185"
    placeholder="Ability Text (Use *Ability* to Bold and Underline keywords)"></textarea>
    <div id="abilityCount">0 / 185</div>
</textarea>

<hr>

<button onclick="downloadCard()">
Export Card
</button>


</div>

<div id="card">

<img id="art" src="Images/Placeholder Image.png">

<img class="layer" src="Images/Card Base Overlay.png">

<img id="factionLayer" class="layer">

<img id="rarityLayer" class="layer">

<img id="typeLayer" class="layer">


<div id="nameText"></div>
<div id="manaText"></div>
<div id="typeText"></div>
<div id="abilityText">
    <div id="abilityContent"></div>
</div>

<div id="attackText"></div>
<div id="healthText"></div>
<div id="sparkText"></div>

<div id="attributeContainer"></div>

</div>


</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
