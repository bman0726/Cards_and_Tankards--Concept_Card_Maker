<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards & Tankards Concept Card Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Cards & Tankards Concept Card Maker</h1>

    <div class="container">

        <div class="controls">

            <h2>Card Image</h2>
            <input type="file" id="cardImage" accept="image/*" aria-label="Upload card image">
            <div id="imageStatus"></div>

            <h2>Faction</h2>
            <select id="faction" aria-label="Select faction">
                <option value="Neutral">Neutral</option>
                <option value="AO">Augur Order</option>
                <option value="PG">Plundering Guild</option>
                <option value="DM">Dungeon Master</option>
                <option value="WH">Wild Horde</option>
            </select>

            <h2>Rarity</h2>
            <select id="rarity" aria-label="Select rarity">
                <option value="Common">Common</option>
                <option value="Uncommon">Uncommon</option>
                <option value="Rare">Rare</option>
                <option value="Legendary">Legendary</option>
            </select>

            <h2>Card Type</h2>
            <select id="cardType" aria-label="Select card type">
                <option value="Creature">Creature</option>
                <option value="Spell">Spell</option>
                <option value="Relic">Relic</option>
            </select>

            <h2>Card Info</h2>
            <hr>

            <label for="name">Card Name</label>
            <input id="name" placeholder="Card Name" maxlength="65" aria-label="Enter card name">

            <label for="mana">Mana Cost</label>
            <input id="mana" placeholder="Mana Cost" maxlength="2" aria-label="Enter mana cost">

            <label for="subtype">Subtype</label>
            <select id="subtype" aria-label="Select subtype"></select>

            <div id="customSubtypeContainer" style="display:none;">
                <label for="customSubtype">Custom Subtype</label>
                <input id="customSubtype" type="text" placeholder="Custom Subtype" aria-label="Enter custom subtype">
            </div>

            <div id="creatureStats">
                <label for="attack">Attack</label>
                <input id="attack" placeholder="Attack" maxlength="2" aria-label="Enter attack">

                <label for="health">Health</label>
                <input id="health" placeholder="Health" maxlength="2" aria-label="Enter health">
            </div>

            <div id="relicStats">
                <label for="sparks">Sparks</label>
                <input id="sparks" placeholder="Sparks" maxlength="2" aria-label="Enter sparks">
            </div>

            <hr>
            <h3>Attributes</h3>
            <div id="attributeCheckboxes"></div>
            <hr>

            <h3>Statuses</h3>
            <div id="statusCheckboxes"></div>
            <hr>

            <textarea id="ability" maxlength="185" placeholder="Ability Text (Use *Ability* to Bold and Underline keywords)" aria-label="Enter ability text"></textarea>
            <div id="abilityCount">0 / 185</div>

            <hr>

            <button onclick="saveCard()">Export .ctcard File</button>

            <input type="file" id="loadCard" accept=".ctcard" style="display:none;" aria-label="Load card file">

            <button onclick="document.getElementById('loadCard').click()">Open .ctcard File</button>

            <hr>

            <button onclick="downloadCard()">Download Card Image</button>

            <button onclick="resetCard()">Reset Card</button>

        </div>

        <div id="card">
            <img id="art" src="Images/Placeholder Image.png" alt="Card Art">
            <img class="layer" src="Images/Card Base Overlay.png" alt="Card Base Overlay">
            <img id="factionLayer" class="layer" alt="Faction Layer">
            <img id="rarityLayer" class="layer" alt="Rarity Layer">
            <img id="typeLayer" class="layer" alt="Type Layer">

            <div id="nameText" aria-label="Card Name"></div>
            <div id="manaText" aria-label="Mana Cost"></div>
            <div id="typeText" aria-label="Card Type"></div>
            <div id="abilityText">
                <div id="abilityContent" aria-label="Ability Text"></div>
            </div>

            <div id="attackText" aria-label="Attack"></div>
            <div id="healthText" aria-label="Health"></div>
            <div id="sparkText" aria-label="Sparks"></div>

            <div id="attributeContainer" aria-label="Attributes"></div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
