<!DOCTYPE html>
<html>
<head>
    <title>Cards & Tankards Concept Card Maker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Cards & Tankards Concept Card Maker</h1>

<div class="container">

<div class="controls">

<h2>Card Image</h2>
<input type="file" id="cardImage" accept="image/*">


<h2>Faction</h2>
<select id="faction">
    <option value="Neutral">Neutral</option>
    <option value="AO">Augur Order</option>
    <option value="PG">Plundering Guild</option>
    <option value="DM">Dungeon Master</option>
    <option value="WH">Wild Horde</option>
</select>


<h2>Rarity</h2>
<select id="rarity">
    <option value="Common">Common</option>
    <option value="Uncommon">Uncommon</option>
    <option value="Rare">Rare</option>
    <option value="Legendary">Legendary</option>
</select>


<h2>Card Type</h2>
<select id="cardType">
    <option value="Creature">Creature</option>
    <option value="Spell">Spell</option>
    <option value="Relic">Relic</option>
</select>



<h2>Text</h2>

<input id="mana" placeholder="Mana Cost">

<input id="name" placeholder="Card Name">

<select id="subtype">
    <option value="">Select Subtype</option>
</select>

<div id="customSubtypeContainer" style="display:none;">
    <label>Custom Subtype</label>
    <input id="customSubtype" type="text" placeholder="Custom Subtype">
</div>    

<div id="creatureStats">

<input id="attack" placeholder="Attack">

<input id="health" placeholder="Health">

</div>


<div id="relicStats">

<input id="sparks" placeholder="Sparks">

</div>


<textarea id="ability" placeholder="Ability Text (*Entrance:* works)"></textarea>


<button onclick="downloadCard()">
Export Card
</button>


</div>


<div id="card">

<img id="art" src="Images/Placeholder Image.png">

<img class="layer" src="Images/Card Base Overlay.png">

<img id="factionLayer" class="layer">

<img id="rarityLayer" class="layer">

<img id="typeLayer" class="layer">


<div id="manaText"></div>
<div id="nameText"></div>
<div id="typeText"></div>
<div id="abilityText"></div>

<div id="attackText"></div>
<div id="healthText"></div>
<div id="sparkText"></div>


</div>


</div>


<script src="script.js"></script>

</body>
</html>
